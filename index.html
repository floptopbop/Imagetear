
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI_DIAL // ANALOG_BOUNDS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root { 
            --void: #050506;
            --deck-bg: #111112;
            --phosphor: #b5c4b1; /* Wabi-sabi aged sage */
            --border: #2a2a2a;
            --alert: #a85b5b;
            --lcd-bg: #0a0e0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--void); color: var(--phosphor);
            font-family: 'VT323', monospace; overflow: hidden;
            touch-action: none; display: flex; flex-direction: column;
        }

        /* The Pure Field (Canvas Container) */
        #canvas-container {
            flex-grow: 1; position: relative; overflow: hidden;
            background: var(--void); width: 100%;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated; z-index: 1;
        }

        /* Central Insert Tape Trigger (Inside the Field) */
        #insert-trigger {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px; font-size: 16px;
            z-index: 20; cursor: pointer; background: var(--deck-bg);
            border: 1px solid var(--phosphor);
            letter-spacing: 2px; text-transform: uppercase;
            border-radius: 2px; transition: opacity 0.3s;
            box-shadow: 0 0 10px rgba(181, 196, 177, 0.2);
        }
        #insert-trigger:active { background: #222; }

        /* The Machine (VHS UI Deck at the Bottom) */
        #vhs-deck {
            flex-shrink: 0; width: 100%; background: var(--deck-bg);
            border-top: 2px solid var(--border);
            position: relative; z-index: 100;
            display: flex; flex-direction: column;
            /* VHS Chromatic Aberration & Scanlines */
            text-shadow: 1px 0px 1px rgba(255,0,0,0.6), -1px 0px 1px rgba(0,255,255,0.6);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.8);
        }
        #vhs-deck::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 999;
        }

        /* LCD Readout Screen */
        #lcd-screen {
            background: var(--lcd-bg); padding: 4px 15px;
            font-size: 16px; display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            letter-spacing: 1px; color: var(--phosphor);
        }

        /* Compact Pop-up Drawer */
        #drawer {
            height: 0; transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: #0d0d0d; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center;
            overflow: hidden;
        }
        #drawer.open { height: 95px; }

        .pane { display: none; padding: 10px 15px; flex-direction: column; gap: 8px; }
        .pane.active { display: flex; }

        /* Tight Horizontal Sliders */
        .slider-row {
            display: flex; align-items: center; justify-content: space-between;
        }
        .slider-row span { font-size: 13px; width: 65px; letter-spacing: 1px; }
        
        input[type=range] {
            appearance: none; background: #222; height: 4px; 
            border: 1px solid #333; flex-grow: 1; margin: 0 10px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 10px; height: 16px;
            background: var(--phosphor); cursor: pointer; border-radius: 2px;
        }

        /* The Tabs / Hardware Buttons */
        #tabs {
            display: flex; height: 45px;
        }
        .tab-btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            border-right: 1px solid var(--border);
            font-size: 15px; color: var(--phosphor); letter-spacing: 1px;
            cursor: pointer; background: transparent; transition: background 0.1s;
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active { background: var(--phosphor); color: #000; text-shadow: none; font-weight: bold;}
        .tab-btn:active { background: #333; }
        .alert { color: var(--alert); }

        #loader { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- THE PURE FIELD -->
<div id="canvas-container">
    <canvas id="vort"></canvas>
    
    <label for="loader" id="insert-trigger" class="vhs-ui">
        [ LOAD TAPE ]
    </label>
    <input type="file" id="loader" accept="image/*">
</div>

<!-- THE MACHINE -->
<div id="vhs-deck">
    <!-- Readout -->
    <div id="lcd-screen">
        <div><span id="osd-status">STOP</span> <span id="timecode">00:00:00</span></div>
        <div>NODES: <span id="node-count">0</span></div>
    </div>
    
    <!-- Tracking Drawer -->
    <div id="drawer">
        <div id="pane-field" class="pane">
            <div class="slider-row">
                <span>ENTROPY</span>
                <input type="range" id="s-shred" min="10" max="100" value="45">
            </div>
            <div class="slider-row">
                <span>FLUCT.</span>
                <input type="range" id="s-chaos" min="0" max="25" step="0.5" value="4">
            </div>
            <div class="slider-row">
                <span>DILATION</span>
                <input type="range" id="s-time" min="0" max="2" step="0.1" value="1">
            </div>
        </div>
        
        <div id="pane-void" class="pane">
            <div class="slider-row">
                <span>VISCOSITY</span>
                <input type="range" id="s-smear" min="0.01" max="0.9" step="0.01" value="0.25">
            </div>
            <div class="slider-row">
                <span>DAMPING</span>
                <input type="range" id="s-fric" min="0.85" max="1" step="0.005" value="0.965">
            </div>
            <div class="slider-row">
                <span>GRAVITY</span>
                <input type="range" id="s-grav" min="0" max="0.2" step="0.01" value="0.02">
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div id="tabs">
        <div class="tab-btn" onclick="toggleTab('field')" id="tab-field">FIELD</div>
        <div class="tab-btn" onclick="toggleTab('void')" id="tab-void">VOID</div>
        <div class="tab-btn" id="btn-gyro">GYRO</div>
        <label class="tab-btn" for="loader" style="margin:0;">TAPE</label>
        <div class="tab-btn alert" id="btn-koan">STIR</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('vort');
    const container = document.getElementById('canvas-container');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let state = {
        img: null, blocks: [],
        shred: 45, chaos: 4, time: 1.0, smear: 0.25, fric: 0.965, grav: 0.02,
        gyro: { x: 0, y: 0 }, active: false
    };

    // Tape Timecode Logic
    let frames = 0;
    setInterval(() => {
        if(state.active) {
            frames++;
            const s = Math.floor(frames / 60);
            const m = Math.floor(s / 60);
            const pad = (n) => n.toString().padStart(2, '0');
            document.getElementById('osd-status').innerHTML = `<span style="color:#d6e0d0">PLAY</span>`;
            document.getElementById('timecode').innerText = `${pad(m)}:${pad(s%60)}:${pad(frames%60)}`;
            document.getElementById('node-count').innerText = state.blocks.length;
        }
    }, 1000/60);

    // Contained Drawer Logic
    let currentTab = null;
    function toggleTab(tab) {
        const drawer = document.getElementById('drawer');
        document.getElementById('tab-field').classList.remove('active');
        document.getElementById('tab-void').classList.remove('active');
        document.getElementById('pane-field').classList.remove('active');
        document.getElementById('pane-void').classList.remove('active');

        if (currentTab === tab) {
            drawer.classList.remove('open');
            currentTab = null;
        } else {
            document.getElementById('pane-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            drawer.classList.add('open');
            currentTab = tab;
        }
    }

    // Input Bindings
    const bind = (id, key) => {
        document.getElementById(id).oninput = (e) => {
            state[key] = parseFloat(e.target.value);
            if(key === 'shred' && state.img) processImage();
        };
    };
    bind('s-shred', 'shred'); bind('s-chaos', 'chaos'); bind('s-time', 'time');
    bind('s-smear', 'smear'); bind('s-fric', 'fric'); bind('s-grav', 'grav');

    // The Stir (Disturbance)
    document.getElementById('btn-koan').onclick = () => {
        state.blocks.forEach(b => { 
            b.vx += (Math.random()-0.5)*100; 
            b.vy -= Math.random()*80; // Kick them up
        });
    };

    // Explicit Gyro Binding
    document.getElementById('btn-gyro').onclick = async () => {
        const btn = document.getElementById('btn-gyro');
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const res = await DeviceOrientationEvent.requestPermission();
                if(res === 'granted') { bindSensors(btn); }
            } catch (err) { console.log(err); }
        } else { bindSensors(btn); }
    };

    function bindSensors(btn) {
        window.addEventListener('deviceorientation', (e) => {
            state.gyro.x = (e.gamma || 0) * 0.15;
            state.gyro.y = (e.beta || 0) * 0.15;
        });
        btn.classList.add('active');
        btn.innerText = "SENSING";
    }

    // Load Image
    document.getElementById('loader').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            state.img = new Image();
            state.img.onload = () => {
                document.getElementById('insert-trigger').classList.add('hidden');
                processImage();
            };
            state.img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function processImage() {
        // Bounds defined by the container, NOT the window.
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        const ratio = state.img.width / state.img.height;
        let w = canvas.width, h = canvas.width / ratio;
        if(h > canvas.height) { h = canvas.height; w = canvas.height * ratio; }

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(state.img, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
        const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        
        state.blocks = [];
        
        function quad(x, y, w, h, d) {
            const idx = (Math.floor(y + h/2) * canvas.width + Math.floor(x + w/2)) * 4;
            const split = d < 8 && w > 8 && (d < 2 || Math.random()*100 < state.shred);
            if(split) {
                let hw = w/2, hh = h/2;
                quad(x, y, hw, hh, d+1); quad(x+hw, y, hw, hh, d+1);
                quad(x, y+hh, hw, hh, d+1); quad(x+hw, y+hh, hw, hh, d+1);
            } else if(data[idx+3] > 20) {
                state.blocks.push({
                    x, y, w, h, vx: 0, vy: 0,
                    c: `rgb(${data[idx]},${data[idx+1]},${data[idx+2]})`,
                    m: (w*h)/60
                });
            }
        }
        quad(0, 0, canvas.width, canvas.height, 0);
        state.active = true;
    }

    // Engine Loop
    function loop() {
        ctx.fillStyle = `rgba(5,5,6,${state.smear})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        if(state.active) {
            const dt = state.time;
            state.blocks.forEach(b => {
                b.vx += (state.gyro.x + (Math.random()-0.5)*state.chaos*0.1) * dt;
                b.vy += (state.gyro.y + state.grav * b.m + (Math.random()-0.5)*state.chaos*0.1) * dt;
                
                b.vx *= Math.pow(state.fric, dt);
                b.vy *= Math.pow(state.fric, dt);
                
                b.x += b.vx * dt; 
                b.y += b.vy * dt;
                
                // Bounds against the canvas, meaning they bounce OFF the UI Deck
                if(b.x < 0 || b.x+b.w > canvas.width) b.vx *= -0.7;
                if(b.y < 0 || b.y+b.h > canvas.height) {
                    b.y = canvas.height - b.h; // Prevent sinking
                    b.vy *= -0.7;
                }
                
                ctx.fillStyle = b.c;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            });
        }
        requestAnimationFrame(loop);
    }

    // Touch Interaction mapped to container offsets
    canvas.addEventListener('touchmove', (e) => {
        if(!state.active) return;
        const rect = canvas.getBoundingClientRect();
        const t = e.touches[0];
        const mx = t.clientX - rect.left;
        const my = t.clientY - rect.top;

        state.blocks.forEach(b => {
            const dx = b.x - mx, dy = b.y - my;
            if(Math.sqrt(dx*dx+dy*dy) < 70) { b.vx += dx*0.4; b.vy += dy*0.4; }
        });
    });

    window.addEventListener('resize', () => { if(state.img) processImage(); });
    requestAnimationFrame(loop);
</script>
</body>
</html>
